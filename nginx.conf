upstream terminal_api {
    server open-terminal-api:8000;
}

upstream memory_api {
    server memory-api:8001;
}

upstream vector_memory_api {
    server vector-memory-api:8002;
}

upstream filesystem_api {
    server filesystem-api:8003;
}

upstream summarizer_api {
    server summarizer-api:8004;
}

# Rate Limiting Zone Definition
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=terminal_limit:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name deine-domain.de www.deine-domain.de;

    return 301 https://$host$request_uri;
}

server {
    listen 8080;
    listen [::]:8080;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name deine-domain.de www.deine-domain.de _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Client body size limit
    client_max_body_size 50M;

    # CORS Headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # API Info
    location /api-info {
        access_log off;
        return 200 '{"gateway":"API Gateway v1.0","services":["terminal","memory","vector-memory","filesystem","summarizer"]}';
        add_header Content-Type application/json;
    }

    # OpenAPI specification
    location = /openapi.json {
        access_log off;
        default_type application/json;
        alias /usr/share/nginx/html/openapi.json;
    }

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ========================
    # Terminal API - /api/terminals/*
    # ========================
    location = /api/terminals {
        return 308 /api/terminals/;
    }

    location /api/terminals/ {
        limit_req zone=terminal_limit burst=20 nodelay;

        proxy_pass http://terminal_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Gateway true;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========================
    # Memory API - /api/memory/*
    # ========================
    location /api/memory/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://memory_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Gateway true;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========================
    # Vector Memory API - /api/vector/*
    # ========================
    location /api/vector/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://vector_memory_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Gateway true;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========================
    # Filesystem API - /api/filesystem/*
    # ========================
    location /api/filesystem/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://filesystem_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Gateway true;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering off;
    }

    # ========================
    # Summarizer API - /api/summarizer/*
    # ========================
    location /api/summarizer/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://summarizer_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Gateway true;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 16 4k;
    }

    # Dashboard UI
    location = /dashboard {
        return 302 /dashboard/;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Homepage redirect to dashboard
    location = / {
        return 302 /dashboard/;
    }

    # 404 for unknown paths
    location / {
        return 404 '{"error":"Not Found","available_endpoints":["/dashboard/","/api/terminals","/api/memory","/api/vector","/api/filesystem","/api/summarizer"]}';
        add_header Content-Type application/json;
    }
}

